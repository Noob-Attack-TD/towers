<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Wiki | Noob Attack TD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">NOOB ATTACK TD</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="index.html" class="active">Towers</a></li>
                <li><a href="/lore/">Lore</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="content">
            <header class="page-header">
                <h1>All Towers</h1>
                <p>Select a tower to view detailed leveling stats and abilities.</p>
            </header>

            <div id="loading" class="status-msg">Loading Tower Database...</div>
            <div id="tower-grid" class="tower-grid"></div>
        </section>
    </main>

    <script>
        async function loadHub() {
            try {
                const response = await fetch('stats.json');
                const data = await response.json();
                const grid = document.getElementById('tower-grid');
                document.getElementById('loading').style.display = 'none';

                for (let id in data.towers) {
                    // Skip Dev Towers
                    if (id === "Skoonify" || id === "El13bui") continue;

                    const tower = data.towers[id];
                    grid.innerHTML += `
                        <a href="view.html?id=${id}" class="tower-card">
                            <div class="tower-card-info">
                                <h3>${tower.name}</h3>
                                <span class="type-tag">${tower.type}</span>
                            </div>
                        </a>
                    `;
                }
            } catch (e) {
                document.getElementById('loading').innerText = "Failed to load stats.json";
            }
        }
        loadHub();
    </script>
</body>
</html>
